# netlify.toml — Netlify configuration for PawShop

[build]
  publish = "."                        # serve pawshop.html from root
  functions = "netlify/functions"      # serverless functions directory

[build.environment]
  NODE_VERSION = "18"

# Stripe webhook endpoint — Netlify serves this automatically
# Register this URL in your Stripe Dashboard → Webhooks:
# https://your-site.netlify.app/.netlify/functions/stripe-webhook
[[redirects]]
  from = "/api/create-payment-intent"
  to = "/.netlify/functions/create-payment-intent"
  status = 200

[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
